<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#333" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
    <marker id="arr-veto" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#C44" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="#fff"/>

  <!-- ══════════ SENSORS / INPUTS ══════════ -->
  <text x="32" y="32" fill="#333" font-size="13" font-weight="600">Inputs · EarthRover SDK</text>

  <rect x="32" y="50" width="200" height="56" rx="8" fill="#EBF5FF" stroke="#4A90D9" stroke-width="1"/>
  <text x="132" y="74" text-anchor="middle" fill="#1A5694" font-size="13" font-weight="600">GPS fix</text>
  <text x="132" y="92" text-anchor="middle" fill="#4A78A5" font-size="10">lat / lon · compass heading</text>

  <rect x="252" y="50" width="200" height="56" rx="8" fill="#EBF5FF" stroke="#4A90D9" stroke-width="1"/>
  <text x="352" y="74" text-anchor="middle" fill="#1A5694" font-size="13" font-weight="600">Mission API</text>
  <text x="352" y="92" text-anchor="middle" fill="#4A78A5" font-size="10">checkpoint list · register</text>

  <rect x="472" y="50" width="200" height="56" rx="8" fill="#EBF5FF" stroke="#4A90D9" stroke-width="1"/>
  <text x="572" y="74" text-anchor="middle" fill="#1A5694" font-size="13" font-weight="600">Front camera</text>
  <text x="572" y="92" text-anchor="middle" fill="#4A78A5" font-size="10">RGB frame stream</text>

  <!-- arrows down to processing -->
  <line x1="132" y1="106" x2="132" y2="160" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="352" y1="106" x2="352" y2="160" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="572" y1="106" x2="572" y2="160" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ══════════ PROCESSING TIER ══════════ -->
  <text x="32" y="146" fill="#333" font-size="13" font-weight="600">Outdoor stack (this fork)</text>

  <rect x="24" y="160" width="852" height="160" rx="10" fill="none" stroke="#bbb" stroke-width="0.8" stroke-dasharray="6,3"/>

  <!-- WaypointManager -->
  <rect x="40" y="180" width="216" height="84" rx="8" fill="#E6F7F0" stroke="#1D9E75" stroke-width="1"/>
  <text x="148" y="206" text-anchor="middle" fill="#085041" font-size="13" font-weight="600">WaypointManager</text>
  <text x="148" y="224" text-anchor="middle" fill="#3A8A6E" font-size="10">haversine distance + bearing</text>
  <text x="148" y="240" text-anchor="middle" fill="#3A8A6E" font-size="10">advances active checkpoint</text>
  <text x="148" y="256" text-anchor="middle" fill="#3A8A6E" font-size="9" font-style="italic">src/T_gps_navigator.py</text>

  <!-- Outdoor controller -->
  <rect x="296" y="180" width="240" height="84" rx="8" fill="#FFF0E8" stroke="#D85A30" stroke-width="1"/>
  <text x="416" y="206" text-anchor="middle" fill="#712B13" font-size="13" font-weight="600">Outdoor P-controller</text>
  <text x="416" y="224" text-anchor="middle" fill="#A86040" font-size="10">heading error → angular</text>
  <text x="416" y="240" text-anchor="middle" fill="#A86040" font-size="10">distance gate → linear</text>
  <text x="416" y="256" text-anchor="middle" fill="#A86040" font-size="9" font-style="italic">src/T_outdoor_controller.py</text>

  <!-- Depth safety -->
  <rect x="576" y="180" width="280" height="84" rx="8" fill="#FCEBEB" stroke="#C44" stroke-width="1"/>
  <text x="716" y="206" text-anchor="middle" fill="#791F1F" font-size="13" font-weight="600">Depth safety layer</text>
  <text x="716" y="224" text-anchor="middle" fill="#A66" font-size="10">DA-V2 monocular depth</text>
  <text x="716" y="240" text-anchor="middle" fill="#A66" font-size="10">veto · slow · stop on obstacle</text>
  <text x="716" y="256" text-anchor="middle" fill="#A66" font-size="9" font-style="italic">src/depth_safety.py · depth_estimator.py</text>

  <!-- WaypointManager → Controller -->
  <line x1="256" y1="222" x2="292" y2="222" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="232" y="194" width="84" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="274" y="208" text-anchor="middle" fill="#666" font-size="10">target bearing</text>

  <!-- Controller → command output (down) -->
  <line x1="416" y1="320" x2="416" y2="370" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="356" y="332" width="120" height="22" rx="11" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="416" y="347" text-anchor="middle" fill="#444" font-size="11">linear · angular cmd</text>

  <!-- Depth safety → controller (veto, red dashed) -->
  <path d="M576,242 L552,242" fill="none" stroke="#C44" stroke-width="1.4" marker-end="url(#arr-veto)"/>
  <text x="564" y="232" text-anchor="middle" fill="#C44" font-size="10">veto / scale</text>

  <!-- Camera feeds depth safety (extra) -->
  <line x1="572" y1="160" x2="572" y2="180" stroke="#333" stroke-width="1.2"/>

  <!-- T_outdoor_runtime banner across the bottom of the dashed box -->
  <text x="450" y="304" text-anchor="middle" fill="#888" font-size="11" font-style="italic">orchestrated by T_outdoor_runtime.py</text>

  <!-- ══════════ OUTPUT TIER ══════════ -->
  <text x="32" y="362" fill="#333" font-size="13" font-weight="600">Actuation</text>

  <rect x="296" y="370" width="240" height="58" rx="8" fill="#F3EEFE" stroke="#8B72BE" stroke-width="1"/>
  <text x="416" y="394" text-anchor="middle" fill="#4E3D80" font-size="13" font-weight="600">RTM client → BOT_UID</text>
  <text x="416" y="412" text-anchor="middle" fill="#7A6BA0" font-size="10">WebSocket motor commands</text>

  <line x1="416" y1="428" x2="416" y2="452" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="416" y="470" text-anchor="middle" fill="#444" font-size="12" font-weight="600">EarthRover motors</text>

  <!-- ══════════ LEGEND ══════════ -->
  <g transform="translate(600,360)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#EBF5FF" stroke="#4A90D9" stroke-width="0.8"/>
    <text x="20" y="11" fill="#666" font-size="10">SDK input</text>
    <rect x="100" y="0" width="14" height="14" rx="3" fill="#E6F7F0" stroke="#1D9E75" stroke-width="0.8"/>
    <text x="120" y="11" fill="#666" font-size="10">Navigation</text>
    <rect x="200" y="0" width="14" height="14" rx="3" fill="#FFF0E8" stroke="#D85A30" stroke-width="0.8"/>
    <text x="220" y="11" fill="#666" font-size="10">Control</text>
    <rect x="0" y="22" width="14" height="14" rx="3" fill="#FCEBEB" stroke="#C44" stroke-width="0.8"/>
    <text x="20" y="33" fill="#666" font-size="10">Safety</text>
    <rect x="100" y="22" width="14" height="14" rx="3" fill="#F3EEFE" stroke="#8B72BE" stroke-width="0.8"/>
    <text x="120" y="33" fill="#666" font-size="10">Actuation</text>
  </g>
</svg>
